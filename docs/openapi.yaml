openapi: "3.0.3"

info:
  title: Inventory Optimizer API
  description: |
    REST API for analyzing inventory data, computing optimal reorder policies
    via Monte-Carlo simulation, and managing persisted reports.
  version: "0.3.0"
  contact:
    name: Noble Eluwah

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
    description: Registration, login, and token refresh
  - name: Analysis
    description: Upload CSVs and run the optimization engine
  - name: Reports
    description: List, retrieve, download, or delete saved reports
  - name: User
    description: User profile
  - name: System
    description: Health check

paths:
  /api/health:
    get:
      tags: [System]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already registered

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid email or password

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh an access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid or expired refresh token

  /api/analyze:
    post:
      tags: [Analysis]
      summary: Upload CSV files and run inventory analysis
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [sales_file, params_file]
              properties:
                sales_file:
                  type: string
                  format: binary
                  description: Weekly sales history CSV
                params_file:
                  type: string
                  format: binary
                  description: SKU parameters CSV
                title:
                  type: string
                  description: Optional report title
                  default: Untitled Analysis
                service_level:
                  type: number
                  description: Target service level (0.90, 0.95, 0.99)
                  default: 0.95
                sim_runs:
                  type: integer
                  description: Monte-Carlo simulation runs
                  default: 500
                sim_weeks:
                  type: integer
                  description: Simulation horizon in weeks
                  default: 52
      responses:
        "201":
          description: Analysis complete, report persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Analysis failed (bad CSV data)
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/reports:
    get:
      tags: [Reports]
      summary: List saved reports (newest first)
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated list of reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/reports/{id}:
    get:
      tags: [Reports]
      summary: Get a specific report with full results
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportID"
      responses:
        "200":
          description: Full report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "404":
          description: Report not found
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Reports]
      summary: Delete a report
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportID"
      responses:
        "200":
          description: Report deleted
        "404":
          description: Report not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/reports/{id}/csv:
    get:
      tags: [Reports]
      summary: Download report as CSV
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportID"
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "404":
          description: Report not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/user/profile:
    get:
      tags: [User]
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ReportID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    HealthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status:
              type: string
              example: ok
            version:
              type: string
              example: "0.3.0"

    AuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: seller@example.com
        password:
          type: string
          minLength: 8
          example: securepass123

    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
            tokens:
              $ref: "#/components/schemas/TokenPair"

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          description: Seconds until access token expires

    Envelope:
      type: object
      properties:
        data:
          type: object
        error:
          $ref: "#/components/schemas/APIError"
        meta:
          $ref: "#/components/schemas/Meta"

    ErrorEnvelope:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/APIError"

    APIError:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string

    Meta:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    ReportListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReportSummary"
        meta:
          $ref: "#/components/schemas/Meta"

    ReportSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        service_level:
          type: number
        sim_runs:
          type: integer
        sim_weeks:
          type: integer
        sku_count:
          type: integer
        warnings:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
