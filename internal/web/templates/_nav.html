{{define "nav"}}
<header>
    <div class="container header-bar">
        <a href="/" class="header-link"><h1>📦 Inventory Optimizer</h1></a>
        <button class="mobile-menu-btn" type="button" aria-label="Toggle menu" aria-expanded="false" onclick="const nav = document.querySelector('.header-nav'); nav.classList.toggle('nav-open'); this.setAttribute('aria-expanded', nav.classList.contains('nav-open'))">
            ☰
        </button>
        <nav class="header-nav">
                {{if .IsLoggedIn}}
                <span class="nav-user">{{.UserEmail}}</span>
                <a href="/dashboard" class="btn-header {{if .ActiveDashboard}}active{{end}}">Dashboard</a>
                <a href="/catalogue" class="btn-header btn-header-accent {{if .ActiveCatalogue}}active{{end}}">Catalogue</a>
                <a href="/records" class="btn-header btn-header-accent {{if .ActiveRecords}}active{{end}}">Smart Records</a>
                <a href="/reports" class="btn-header {{if .ActiveReports}}active{{end}}">My Reports</a>
                <a href="/upload" class="btn-header {{if .ActiveUpload}}active{{end}}">New Analysis</a>
                <a href="/logout" class="btn-header btn-outline-header">Logout</a>
            {{else if .HasAuth}}
                <a href="/upload" class="btn-header">Try Free</a>
                <a href="/login" class="btn-header">Login</a>
                <a href="/register" class="btn-header btn-primary-sm">Sign Up</a>
            {{else}}
                <a href="/upload" class="btn-header">Get Started</a>
            {{end}}
        </nav>
    </div>
        <div id="toastContainer" style="position:fixed; top:72px; right:18px; z-index:9999;"></div>
        <script>
            window.showToast = function(message, type = 'info', timeout = 4000) {
                const c = document.getElementById('toastContainer');
                const t = document.createElement('div');
                t.textContent = message;
                t.style.background = type === 'error' ? '#fee2e2' : (type === 'success' ? '#dcfce7' : '#eff6ff');
                t.style.color = type === 'error' ? '#7f1d1d' : (type === 'success' ? '#065f46' : '#0f172a');
                t.style.padding = '0.7rem 1rem';
                t.style.borderRadius = '10px';
                t.style.boxShadow = '0 6px 18px rgba(2,6,23,0.12)';
                t.style.marginTop = '0.5rem';
                c.appendChild(t);
                setTimeout(()=>{ t.style.opacity = '0'; setTimeout(()=>c.removeChild(t), 300); }, timeout);
            }
        </script>
</header>
{{end}}
