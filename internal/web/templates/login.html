<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Inventory Optimizer</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {{template "nav" .}}

    <main class="container">
        <section class="auth-card">
            <h2>Welcome back</h2>
            <p class="auth-sub">Log in to access your saved reports, full analysis, and PDF downloads.</p>

            {{if .Error}}
            <div class="alert alert-warning">{{.Error}}</div>
            {{end}}

            <form action="/login" method="POST" class="auth-form">
                {{if .Redirect}}
                <input type="hidden" name="redirect" value="{{.Redirect}}">
                {{end}}

                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" value="{{.Email}}" required
                           placeholder="you@example.com" autocomplete="email" autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Your password" autocomplete="current-password" minlength="8">
                </div>

                <button type="submit" class="btn-primary">Log In</button>
            </form>

            <p class="auth-switch">
                Don't have an account? <a href="/register">Create one for free</a>
            </p>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>Inventory Optimizer v{{.Version}} · Built for e-commerce sellers</p>
        </div>
    </footer>
</body>
</html>
